version: "3.9"

services:
  django:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    env_file: .env.example
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    command: celery -A core worker -l info
    env_file: .env.example
    depends_on:
      - db
      - redis

  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    command: celery -A core beat -l info
    env_file: .env.example
    depends_on:
      - db
      - redis

  react:
    build:
      context: .
      dockerfile: infra/docker/react.Dockerfile
    ports:
      - "3000:80"

  db:
    image: postgres:16-alpine
    env_file: .env.example
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - django
      - react

volumes:
  pgdata:
