version: "3.9"

services:
  django:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    env_file: .env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    command: python manage.py simulate_buses --step 5
    env_file: .env
    depends_on:
      - django
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    command: celery -A core worker -l info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/django.Dockerfile
    command: celery -A core beat -l info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  react:
    build:
      context: .
      dockerfile: infra/docker/react.Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_WS_URL: ${REACT_APP_WS_URL:-/ws}
    ports:
      - "3000:80"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - django
      - react
    restart: unless-stopped

volumes:
  pgdata:
